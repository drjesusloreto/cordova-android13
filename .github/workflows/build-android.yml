name: "Ungido Bóveda - Pipeline de Compilación API 35"

on:
  push:
    branches: [ "main", "master", "desarrollo" ]
  workflow_dispatch:

jobs:
  compile-android:
    name: "Orquestador de Compilación en Nube"
    runs-on: ubuntu-latest

    steps:
    - name: "1. Descarga de Código Fuente"
      uses: actions/checkout@v4

    - name: "2. Inicializar Java JDK 17"
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: "3. Inicializar Entorno Node.js"
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: "4. Instalar CLI de Cordova Globalmente"
      run: |
        npm install -g cordova@latest
        
