name: "Ungido - Pipeline de Compilación Táctica API 35"

on:  
  push:    
    branches: [ "main", "master", "desarrollo" ]  
  workflow_dispatch: # Permite disparar la compilación manualmente desde la interfaz de GitHub

jobs:  
  compile-android:    
    name: "Orquestador de Compilación en Nube"    
    runs-on: ubuntu-latest # Infraestructura nativa Linux x64    
    steps:    
    - name: "1. Descarga de Código Fuente"      
      uses: actions/checkout@v4    
    
    - name: "2. Inicializar Java JDK 17"      
      uses: actions/setup-java@v4      
      with:        
        distribution: 'zulu'        
        java-version: '17' # Requerido obligatoriamente por Gradle 8.x para API 35    
    
    - name: "3. Inicializar Entorno Node.js"      
      uses: actions/setup-node@v4      
      with:        
        node-version: '24' # Versión LTS madura. Node 20 es el estándar blindado para Cordova 13    
    
    - name: "4. Instalar CLI de Cordova Globalmente"      
      run: |        
        npm install -g cordova@latest            
    
    - name: "5. Preparar Arsenal Criptográfico (Dependencias de Seguridad)"      
      run: |        
        npm install crypto-js javascript-obfuscator    
    
    - name: "6. Operación Espejo (Cifrado AES de Módulos - Backend Node)"      
      env:        
        LLAVE_TACTICA: ${{ secrets.LLAVE_TACTICA }}      
      run: |        
        # Ejecuta el script de Node que lee los .js, los cifra a .enc y borra los originales        
        node scripts/cifrador.js || true    
    
    - name: "6.5 Inyección Criptográfica en Cliente (Zero-Trust JS)"      
      run: |        
        # Inyecta la llave de forma efímera en el Orquestador        
        sed -i "s/__LLAVE_TACTICA__/${{ secrets.LLAVE_TACTICA }}/g" www/js/loader-mobile.js || true    
    
    - name: "7. Operación Niebla (Blindaje Ajustado para Evitar Pantalla Gris)"      
      run: |    
        # Se desactiva la autodefensa y el bloqueo de consola temporalmente para permitir el renderizado del WebView
        npx javascript-obfuscator www/js/loader-mobile.js --output www/js/loader-mobile.js \
          --compact true \
          --control-flow-flattening true \
          --control-flow-flattening-threshold 0.7 \
          --numbers-to-expressions true \
          --simplify true \
          --string-array true \
          --string-array-encoding 'base64' \
          --string-array-index-shift true \
          --string-array-wrappers-count 2 \
          --string-array-wrappers-chained-calls true \
          --self-defending false \
          --debug-protection false \
          --disable-console-output false \
          --rename-globals false \
          --domain-lock 'localhost' \
          --domain-lock 'file://' \
          --domain-lock 'cdvfile://'              
    
