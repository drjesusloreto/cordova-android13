        tr -d '\n\r ' < temp_base64.txt | base64 -d > adncristo.Keystore
    - name: "6. Configurar Plataforma (Modo Pausa / Sin Hooks)"
      run: |
        cordova platform add android@13.0.0 --nohooks

    - name: "6.5. Intercepción Criptográfica (Bypass Nativo a HTTPS)"
      run: |
        # 1. Castrar el after_prepare.js para que NO sabotee el config.xml inyectando el puerto 8080
        find plugins/ -type f -name "after_prepare.js" -exec sed -i 's/child.attrib.src =.*/\/\/ Inyeccion del puerto 8080 anulada por la Comandancia/g' {} + || true
        
        # 2. Hackear el código Java del plugin Crypt para que intercepte la ruta nativa HTTPS de Cordova 13
        # Esto convierte cualquier referencia a "http://localhost:8080/" (o derivados) en la ruta moderna "https://localhost/"
        find plugins/ -type f -name "*.java" -exec sed -i 's/"http:\/\/localhost[^"]*"/"https:\/\/localhost\/"/g' {} + || true
        find plugins/ -type f -name "*.java" -exec sed -i 's/"http:\/\/127.0.0.1[^"]*"/"https:\/\/localhost\/"/g' {} + || true

    - name: "6.6. Detonación Controlada (Prepare)"
      run: |
        # Al ejecutar prepare, el plugin encriptará los archivos, pero el Java parchado se copiará al núcleo.
        cordova prepare android

    - name: "7. Blindaje Táctico (Forzar API 35 y Parches Legacy)"
      run: |
        # 1. Parche quirúrgico Gradle
        find platforms/android/ -name "*.gradle" -exec sed -i -E 's/(^|[[:space:]])compile([[:space:]]|\()/\1implementation\2/g' {} + || true
        
        # 2. Parche Java: Migración forzada de Whitelist a AllowList
        find platforms/android/ -name "*.java" -exec sed -i 's/org.apache.cordova.Whitelist/org.apache.cordova.AllowList/g' {} + || true
        find platforms/android/ -name "*.java" -exec sed -i 's/Whitelist whitelist/AllowList whitelist/g' {} + || true
        find platforms/android/ -name "*.java" -exec sed -i 's/(Whitelist)/(AllowList)/g' {} + || true
        find platforms/android/ -name "*.java" -exec sed -i 's/isUrlWhiteListed/isUrlAllowListed/g' {} + || true

        # 3. Inyectar API 35 a la fuerza bruta en el núcleo
        echo "" >> platforms/android/app/build.gradle
        echo "android { compileSdk 35 }" >> platforms/android/app/build.gradle
        echo "android { defaultConfig { targetSdk 35 } }" >> platforms/android/app/build.gradle
        
    - name: "8. Ensamblaje Final: Formato AAB (Google Play Store)"
      run: |
        cordova compile android --release -- \
        --keystore=adncristo.Keystore \
        --storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
        --alias=${{ secrets.ANDROID_KEYSTORE_ALIAS }} \
        --password=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
        --packageType=bundle \
        --gradleArg=-PcdvCompileSdkVersion=35 \
        --gradleArg=-PcdvTargetSdkVersion=35
    - name: "9. Ensamblaje Final: Formato APK (Distribución Directa)"
      run: |
        cordova compile android --release -- \
        --keystore=adncristo.Keystore \
        --storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
        --alias=${{ secrets.ANDROID_KEYSTORE_ALIAS }} \
        --password=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
        --packageType=apk \
        --gradleArg=-PcdvCompileSdkVersion=35 \
        --gradleArg=-PcdvTargetSdkVersion=35
    - name: "10. Preservar y Exportar Artefactos Clínicos (APK + AAB)"
      uses: actions/upload-artifact@v4
      with:
        name: "Ungido-Boveda-API35-Release"
        path: |
          platforms/android/app/build/outputs/apk/release/*.apk
          platforms/android/app/build/outputs/bundle/release/*.aab
        retention-days: 365
