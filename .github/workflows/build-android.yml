        tr -d '\n\r ' < temp_base64.txt | base64 -d > adncristo.Keystore    
    
    - name: "8.5. Purgar Dependencias Fantasma (Erradicación de Whitelist y Crypt)"      
      run: |        
        npm uninstall cordova-plugin-whitelist || true        
        cordova plugin rm cordova-plugin-whitelist --force || true        
        sed -i '/cordova-plugin-whitelist/d' config.xml || true        
        sed -i '/cordova-plugin-whitelist/d' package.json || true        
        rm -rf plugins/cordova-plugin-whitelist || true                
        
        # ☢️ EXTERMINIO FÍSICO DEL SECUESTRADOR DE CÓDIGO JAVA ☢️        
        npm uninstall cordova-plugin-crypt-file-android || true        
        cordova plugin rm cordova-plugin-crypt-file-android --force || true        
        rm -rf plugins/cordova-plugin-crypt-file-android || true        
        rm -rf node_modules/cordova-plugin-crypt-file-android || true    

    - name: "8.6. Actualización Táctica de Plugins Compatibles con API 35"
      run: |
        # Cordova 13 requiere versiones modernas de la cámara y otros core-plugins
        cordova plugin rm cordova-plugin-camera --force || true
        cordova plugin add cordova-plugin-camera@latest || true
        # Eliminamos el viejo splashscreen que bloquea el build
        cordova plugin rm cordova-plugin-splashscreen --force || true

    - name: "9. Configurar Plataforma Android Embebida"      
      run: |        
        # Añadido escudo de red para prevenir fallos (ECONNRESET) de los servidores NPM   
        npm config set fetch-retries 5        
        npm config set fetch-retry-mintimeout 20000        
        npm config set fetch-retry-maxtimeout 120000        
        npm cache clean --force            
        cordova platform add android@13.0.0        
        cordova prepare android  
    
    - name: "10. Blindaje Táctico (Forzar API 35 y Parches Legacy)"      
      run: |        
        # 1. Parche quirúrgico Gradle: Cambia dependencias pero respeta métodos nativos        
        find platforms/android/ -name "*.gradle" -exec sed -i -E 's/(^|[[:space:]])compile([[:space:]]|\()/\1implementation\2/g' {} + || true                
        # 2. Parche Java: Migración forzada de Whitelist a AllowList para plugins obsoletos        
        find platforms/android/ -name "*.java" -exec sed -i 's/org.apache.cordova.Whitelist/org.apache.cordova.AllowList/g' {} + || true        
        find platforms/android/ -name "*.java" -exec sed -i 's/Whitelist whitelist/AllowList whitelist/g' {} + || true        
        find platforms/android/ -name "*.java" -exec sed -i 's/(Whitelist)/(AllowList)/g' {} + || true        
        find platforms/android/ -name "*.java" -exec sed -i 's/isUrlWhiteListed/isUrlAllowListed/g' {} + || true                
        # 3. Inyectar API 35 a la fuerza bruta en el núcleo        
        echo "" >> platforms/android/app/build.gradle        
        echo "android { compileSdk 35 }" >> platforms/android/app/build.gradle        
        echo "android { defaultConfig { targetSdk 35 } }" >> platforms/android/app/build.gradle    
    
    - name: "11. Ensamblaje Final: Formato AAB (Google Play Store)"      
      run: cordova compile android --release -- --keystore=adncristo.Keystore --storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} --alias=${{ secrets.ANDROID_KEYSTORE_ALIAS }} --password=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} --packageType=bundle --gradleArg=-PcdvCompileSdkVersion=35 --gradleArg=-PcdvTargetSdkVersion=35
    
    - name: "12. Ensamblaje Final: Formato APK (Distribución Directa)"      
      run: cordova compile android --release -- --keystore=adncristo.Keystore --storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} --alias=${{ secrets.ANDROID_KEYSTORE_ALIAS }} --password=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} --packageType=apk --gradleArg=-PcdvCompileSdkVersion=35 --gradleArg=-PcdvTargetSdkVersion=35
    
    - name: "13. Preservar y Exportar Artefactos Clínicos (APK + AAB)"      
      uses: actions/upload-artifact@v4      
      with:        
        name: "Ungido-Boveda-API35-Release"        
        path: |          
          platforms/android/app/build/outputs/apk/release/*.apk          
          platforms/android/app/build/outputs/bundle/release/*.aab        
        retention-days: 90
